name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Set Image Metadata
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          IMAGE_TAG=${{ github.sha }}

          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT


      - name: Print Image Info
        run: |
          echo "Image: ${{ steps.meta.outputs.image_name }}"
          echo "Tag: ${{ steps.meta.outputs.image_tag }}"


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest


      - name: Verify Image Push
        run: |
          echo "Docker image pushed successfully"
          echo "${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}"