name: Reusable Workflow

on:
  workflow_call:
    inputs:
      message:
        description: "Message to print"
        required: true
        type: string

    secrets:
      MY_SECRET:
        required: false

jobs:

  reusable-job:
    runs-on: ubuntu-latest

    steps:

      - name: Print message
        run: echo "${{ inputs.message }}"

      - name: Check secret
        if: ${{ secrets.MY_SECRET != '' }}
        run: echo "Secret exists"