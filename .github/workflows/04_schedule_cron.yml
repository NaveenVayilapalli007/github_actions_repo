name: Scheduled Cron Workflow

on:
  schedule:
    - cron: '1 1 1 1 *' 
    - cron: '2 2 2 2 *'   
  workflow_dispatch:        # optional manual trigger

jobs:

  scheduled-job:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Schedule Info
        run: |
          echo "Scheduled workflow triggered"
          echo "Event Name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Triggered By: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"

      - name: Print Date and Time
        run: |
          echo "Current UTC Time:"
          date -u

      - name: Simulate Scheduled Task
        run: |
          echo "Running scheduled job..."
          echo "Example tasks:"
          echo "Nightly ETL"
          echo "Data validation"
          echo "Dependency update"

      - name: Print Workspace Files
        run: ls -la