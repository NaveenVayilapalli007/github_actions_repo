name: Monorepo Microservices Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:

  detect-changes:

    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.services.outputs.matrix }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Services
        id: services
        run: |

          echo "Detecting changed services..."

          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^services/' | cut -d/ -f2 | sort -u)

          if [ -z "$CHANGED" ]; then
            echo "No service changes detected, using all services"
            CHANGED=$(ls services)
          fi

          MATRIX=$(printf '%s\n' $CHANGED | jq -R . | jq -s -c '{service: .}')

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Matrix JSON: $MATRIX"

  build-services:

    runs-on: ubuntu-latest

    needs: detect-changes

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repo Structure
        run: ls -R

      - name: Build Docker Image
        run: |
          SERVICE_PATH="./services/${{ matrix.service }}"

          if [ ! -d "$SERVICE_PATH" ]; then
            echo "Service not found: $SERVICE_PATH"
            exit 1
          fi

          docker build -t ${{ matrix.service }} $SERVICE_PATH

      - name: List Docker Images
        run: docker images


  test-services:

    runs-on: ubuntu-latest

    needs: detect-changes

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install pytest
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run Tests
        run: |
          pytest services/${{ matrix.service }}