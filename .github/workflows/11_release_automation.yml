name: Release Automation

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (ex: v1.0.0)"
        required: true
        default: "v1.0.0"

jobs:

  release:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ inputs.version }}
          else
            VERSION="v$(date +'%Y.%m.%d.%H%M')"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release Version: $VERSION"


      - name: Create Release Artifact
        run: |
          mkdir release
          echo "Release created at $(date)" > release/release-info.txt
          echo "Commit: ${{ github.sha }}" >> release/release-info.txt
          echo "Workflow: ${{ github.workflow }}" >> release/release-info.txt


      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: release/


      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Automated release generated by GitHub Actions.

            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}

          files: release/release-info.txt