name: GitHub Context Debugger

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:

  debug:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -----------------------------
      # Function to flatten JSON
      # -----------------------------

      - name: Dump Github Context
        run: |
          echo '${{ toJson(github) }}' \
          | jq -r 'paths(scalars) as $p | "github | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Runner Context
        run: |
          echo '${{ toJson(runner) }}' \
          | jq -r 'paths(scalars) as $p | "runner | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Job Context
        run: |
          echo '${{ toJson(job) }}' \
          | jq -r 'paths(scalars) as $p | "job | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Env Context
        run: |
          echo '${{ toJson(env) }}' \
          | jq -r 'paths(scalars) as $p | "env | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Strategy Context
        run: |
          echo '${{ toJson(strategy) }}' \
          | jq -r 'paths(scalars) as $p | "strategy | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Matrix Context
        run: |
          echo '${{ toJson(matrix) }}' \
          | jq -r 'paths(scalars) as $p | "matrix | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Needs Context
        run: |
          echo '${{ toJson(needs) }}' \
          | jq -r 'paths(scalars) as $p | "needs | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Vars Context
        run: |
          echo '${{ toJson(vars) }}' \
          | jq -r 'paths(scalars) as $p | "vars | \($p | join(".")) | \(getpath($p))"'

      - name: Dump Inputs Context
        run: |
          echo '${{ toJson(inputs) }}' \
          | jq -r 'paths(scalars) as $p | "inputs | \($p | join(".")) | \(getpath($p))"'