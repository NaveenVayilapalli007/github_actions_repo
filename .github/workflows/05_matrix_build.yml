name: Matrix Build Example

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  build-test:

    strategy:
      fail-fast: false

      matrix:

        os: [ubuntu-latest, windows-latest, macos-latest]

        python-version: [ "3.9", "3.10", "3.11" ]

        # Remove unsupported combinations
        exclude:
          - os: windows-latest
            python-version: "3.9"

          - os: macos-latest
            python-version: "3.10"

        # Add special combinations
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            experimental: true

          - os: windows-latest
            python-version: "3.11"
            special-run: true

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Matrix Values
        run: |
            echo "OS: ${{ matrix.os }}"
            echo "Python: ${{ matrix.python-version }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Environment Info
        run: |
          echo "Operating System: ${{ matrix.os }}"
          echo "Python Version: ${{ matrix.python-version }}"
          echo "Experimental: ${{ matrix.experimental }}"
          echo "Special Run: ${{ matrix.special-run }}"

      - name: Run Tests
        run: |
          echo "Running tests on ${{ matrix.os }} with Python ${{ matrix.python-version }}"
          python --version

      - name: Experimental Job Step
        if: matrix.experimental == true
        run: echo "This is an experimental build."

      - name: Special Windows Step
        if: matrix.special-run == true
        run: echo "Running additional Windows checks."