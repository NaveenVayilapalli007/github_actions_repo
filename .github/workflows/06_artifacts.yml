name: Artifacts Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Build Directory
        run: mkdir -p build

      - name: Generate Example Artifact Files
        run: |
          echo "Build file generated at $(date)" > build/build.txt
          echo "Application version: 1.0.0" >> build/build.txt
          echo "Workflow: ${{ github.workflow }}" >> build/build.txt

      - name: List Build Files
        run: ls -la build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 5


  test:

    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: downloaded-build

      - name: Show Downloaded Files
        run: ls -la downloaded-build

      - name: Print Artifact Content
        run: cat downloaded-build/build.txt

      - name: Simulate Tests Using Artifact
        run: echo "Running tests using downloaded build artifact..."