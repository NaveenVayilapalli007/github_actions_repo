name: Microservice Integration Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  integration-tests:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5


      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5


      mongodb:
        image: mongo:7
        ports:
          - 27017:27017


      redis:
        image: redis:7
        ports:
          - 6379:6379


      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
        ports:
          - 2181:2181


      kafka:
        image: confluentinc/cp-kafka:7.5.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Install Database Clients
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client mysql-client redis-tools


      - name: Wait for Services
        run: |
          echo "Waiting for containers..."
          sleep 25


      - name: Test PostgreSQL
        run: |
          PGPASSWORD=testpassword psql -h localhost -U testuser -d testdb -c "SELECT version();"


      - name: Test MySQL
        run: |
          mysql -h 127.0.0.1 -u testuser -ptestpassword -e "SHOW DATABASES;"


      - name: Test MongoDB
        run: |
          docker run --network host mongo:7 \
          mongosh "mongodb://localhost:27017" --eval "db.runCommand({ ping: 1 })"


      - name: Test Redis
        run: |
          redis-cli -h localhost ping


      - name: Test Kafka
        run: |
          docker run --network host confluentinc/cp-kafka:7.5.0 \
          kafka-topics --bootstrap-server localhost:9092 --list || true


      - name: Run Application Integration Tests
        run: |
          echo "Running microservice integration tests..."
          # example:
          # pytest tests/integration